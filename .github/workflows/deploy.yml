name: Deploy Restaurant Microservices

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore Restaurant.sln

      - name: Build Solution
        run: dotnet build Restaurant.sln --no-restore --configuration Release

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "📦 Pulling latest code..."
            cd ~/restaurant-microservices
            git pull origin main

            echo "🔨 Building solution..."
            dotnet build Restaurant.sln --configuration Release

            echo "🛑 Stopping existing services..."
            screen -r auth -X quit 2>/dev/null || true
            screen -r menu -X quit 2>/dev/null || true
            screen -r order -X quit 2>/dev/null || true
            sleep 3

            echo "🚀 Starting Auth Service..."
            screen -dmS auth bash -c "
              cd ~/restaurant-microservices/AuthService.API
              set -a && source .env && set +a
              dotnet run --configuration Release
            "
            sleep 5

            echo "🚀 Starting Menu Service..."
            screen -dmS menu bash -c "
              cd ~/restaurant-microservices/MenuService.API
              set -a && source .env && set +a
              dotnet run --configuration Release
            "
            sleep 5

            echo "🚀 Starting Order Service..."
            screen -dmS order bash -c "
              cd ~/restaurant-microservices/OrderService.API
              set -a && source .env && set +a
              dotnet run --configuration Release
            "

            echo "✅ Deployment complete!"

      - name: Deployment Success
        run: |
          echo "✅ Successfully deployed!"
          echo "Auth Service:  http://${{ secrets.SERVER_IP }}:5270/swagger"
          echo "Menu Service:  http://${{ secrets.SERVER_IP }}:5271/swagger"
          echo "Order Service: http://${{ secrets.SERVER_IP }}:5272/swagger"